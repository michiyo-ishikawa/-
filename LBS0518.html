<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LBSクラブせとうち 第2回イベント 管理アプリ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Oswald:wght@600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DESIGN TOKENS
============================================================ */
:root {
  --navy:    #0f2344;
  --navy2:   #1a3a6b;
  --gold:    #c9a84c;
  --gold2:   #f0c96e;
  --cream:   #faf8f3;
  --green:   #1e7b34;
  --green2:  #d4edda;
  --green3:  #0d5c27;
  --orange:  #b45f06;
  --orange2: #fdebd0;
  --red:     #c0392b;
  --red2:    #fde8e6;
  --blue2:   #dbeafe;
  --gray:    #6b7280;
  --gray2:   #f3f4f6;
  --gray3:   #e5e7eb;
  --white:   #ffffff;
  --shadow:  0 2px 16px rgba(15,35,68,.10);
  --radius:  10px;
}

/* ============================================================
   RESET & BASE
============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--cream); color: var(--navy); font-size: 14px; }

/* ============================================================
   LAYOUT — HEADER & TABS
============================================================ */
.header {
  background: linear-gradient(120deg, var(--navy) 55%, var(--navy2));
  padding: 14px 24px 0;
  box-shadow: 0 2px 12px rgba(0,0,0,.2);
  position: sticky; top: 0; z-index: 200;
}
.header-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.header-title {
  font-family: 'Oswald', sans-serif; font-size: 20px;
  color: var(--gold2); letter-spacing: .08em;
}
.header-title span {
  font-size: 12px; color: rgba(255,255,255,.55);
  font-family: 'Noto Sans JP', sans-serif; font-weight: 400;
  margin-left: 10px; letter-spacing: .04em;
}
.header-date {
  font-size: 11px; color: var(--gold);
  background: rgba(201,168,76,.15); border: 1px solid rgba(201,168,76,.35);
  border-radius: 20px; padding: 3px 10px; white-space: nowrap;
}
.tabs { display: flex; }
.tab {
  padding: 9px 20px 11px; background: transparent; border: none;
  color: rgba(255,255,255,.5); font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px; font-weight: 700; cursor: pointer;
  border-bottom: 3px solid transparent; transition: all .18s;
  letter-spacing: .04em; white-space: nowrap;
}
.tab:hover  { color: rgba(255,255,255,.85); }
.tab.active { color: var(--gold2); border-bottom-color: var(--gold2); }

.main { max-width: 1400px; margin: 0 auto; padding: 24px 20px; }
.section { display: none; }
.section.active { display: block; }

/* ============================================================
   SUMMARY CARDS
============================================================ */
.summary-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
.card { background: var(--white); border-radius: var(--radius); padding: 16px 18px; box-shadow: var(--shadow); border-top: 4px solid var(--navy); }
.card.green  { border-top-color: var(--green); }
.card.orange { border-top-color: var(--orange); }
.card.gold   { border-top-color: var(--gold); }
.card.red    { border-top-color: var(--red); }
.card-label  { font-size: 11px; color: var(--gray); font-weight: 500; margin-bottom: 6px; letter-spacing: .04em; }
.card-value  { font-size: 28px; font-weight: 700; line-height: 1; }
.card-sub    { font-size: 11px; color: var(--gray); margin-top: 4px; }
.progress-wrap { background: var(--gray3); border-radius: 20px; height: 8px; overflow: hidden; margin-top: 8px; }
.progress-bar  { height: 100%; border-radius: 20px; background: linear-gradient(90deg, var(--green), var(--gold)); transition: width .4s; }

/* ============================================================
   FILTER BAR & BUTTONS
============================================================ */
.filter-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-bar input,
.filter-bar select { border: 1px solid var(--gray3); border-radius: 7px; padding: 7px 12px; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; background: var(--white); color: var(--navy); outline: none; }
.filter-bar input  { flex: 1; min-width: 160px; }
.filter-bar input:focus,
.filter-bar select:focus { border-color: var(--navy2); }

.btn { padding: 7px 16px; border-radius: 7px; border: none; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: all .15s; white-space: nowrap; }
.btn-primary { background: var(--navy);    color: var(--white); }
.btn-primary:hover { background: var(--navy2); }
.btn-gold    { background: var(--gold);    color: var(--navy); }
.btn-gold:hover { background: var(--gold2); }
.btn-outline { background: transparent; border: 1px solid var(--gray3); color: var(--navy); }
.btn-outline:hover { border-color: var(--navy); background: var(--gray2); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-danger { background: var(--red2); color: var(--red); }

/* ============================================================
   TABLE
============================================================ */
.table-wrap { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.tbl th { background: var(--navy); color: var(--white); padding: 10px 12px; font-weight: 700; text-align: left; font-size: 12px; letter-spacing: .04em; white-space: nowrap; }
.tbl td { padding: 9px 12px; border-bottom: 1px solid var(--gray3); vertical-align: middle; }
.tbl tr:last-child td { border-bottom: none; }
.tbl tr:hover td { background: #f8f9ff; }
.tbl tr.row-tokubetsu td { background: #fffbeb; }
.tbl tr.row-sansho    td { background: #fffef5; }
.tbl tr.row-warn      td { background: #fff8f0; }
.tbl .phase-header td { background: var(--gray2); font-weight: 700; font-size: 12px; letter-spacing: .06em; padding: 7px 12px; }

/* ============================================================
   BADGES & STATUS LABELS
============================================================ */
.badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap; }
.badge-tokubetsu { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
.badge-sansho    { background: #fff8dc; color: #78350f; border: 1px solid #fde68a; }
.badge-member    { background: var(--green2); color: var(--green3); border: 1px solid #86efac; }
.badge-student   { background: var(--blue2);  color: #1e40af;       border: 1px solid #93c5fd; }
.badge-general   { background: var(--gray2);  color: var(--gray);   border: 1px solid var(--gray3); }

/* インラインプルダウン（テーブル内） */
.sel-inline { border: 1px solid var(--gray3); border-radius: 6px; padding: 3px 6px; font-size: 12px; font-family: 'Noto Sans JP', sans-serif; background: var(--white); cursor: pointer; outline: none; max-width: 110px; }
.sel-inline:focus { border-color: var(--navy2); }
.sel-inline.s-参加   { color: var(--green3); font-weight: 700; }
.sel-inline.s-欠席   { color: var(--red);    font-weight: 700; }
.sel-inline.s-送信済 { color: #1e40af;       font-weight: 700; }
.sel-inline.s-再送済 { color: var(--orange); font-weight: 700; }
.sel-inline.t-確認中 { color: var(--orange); font-weight: 700; }
.sel-inline.t-完了   { color: var(--green3); font-weight: 700; }
.warn-icon { color: var(--orange); font-size: 13px; }

/* ============================================================
   INLINE INPUT (テーブル内テキスト)
============================================================ */
.inp-inline { border: 1px solid var(--gray3); border-radius: 6px; padding: 3px 8px; font-size: 12px; font-family: 'Noto Sans JP', sans-serif; width: 100%; outline: none; }
.inp-inline:focus { border-color: var(--navy2); }

/* ============================================================
   MODAL
============================================================ */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 500; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal { background: var(--white); border-radius: 14px; padding: 28px; width: 100%; max-width: 560px; box-shadow: 0 8px 40px rgba(0,0,0,.2); max-height: 90vh; overflow-y: auto; }
.modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 18px; color: var(--navy); border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
.modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--gray3); }

.form-row { margin-bottom: 14px; }
.form-row label { display: block; font-size: 12px; font-weight: 700; color: var(--gray); margin-bottom: 5px; letter-spacing: .04em; }
.form-row input,
.form-row select,
.form-row textarea { width: 100%; border: 1px solid var(--gray3); border-radius: 7px; padding: 8px 12px; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; outline: none; background: var(--white); }
.form-row input:focus,
.form-row select:focus,
.form-row textarea:focus { border-color: var(--navy2); }
.form-row textarea { resize: vertical; min-height: 60px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.required { color: var(--red); }

/* ============================================================
   EXHIBITOR CARDS
============================================================ */
.ex-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 12px; overflow: hidden; border-left: 5px solid var(--navy); }
.ex-card.cat-beer  { border-left-color: #f59e0b; }
.ex-card.cat-sake  { border-left-color: #8b5cf6; }
.ex-card.cat-egg   { border-left-color: #f97316; }
.ex-card.cat-meat  { border-left-color: #dc2626; }
.ex-card.cat-veg   { border-left-color: #16a34a; }
.ex-card.cat-snack { border-left-color: #ec4899; }
.ex-card.cat-food  { border-left-color: #0891b2; }
.ex-card.cat-tech  { border-left-color: #6366f1; }
.ex-card.cat-chef  { border-left-color: #ca8a04; }
.ex-card.cat-other { border-left-color: var(--gray); }
.ex-card-inner { padding: 14px 18px; display: flex; align-items: flex-start; gap: 16px; flex-wrap: wrap; }
.ex-no   { font-size: 22px; font-weight: 900; color: var(--gray3); font-family: 'Oswald', sans-serif; min-width: 28px; }
.ex-body { flex: 1; min-width: 200px; }
.ex-cat  { font-size: 10px; font-weight: 700; color: var(--gray); letter-spacing: .08em; margin-bottom: 3px; }
.ex-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.ex-product { font-size: 12px; color: var(--gray); margin-bottom: 6px; }
.ex-keyword { font-size: 11px; background: var(--gray2); border-radius: 5px; padding: 3px 8px; display: inline-block; }
.ex-controls { display: flex; gap: 10px; align-items: flex-start; flex-wrap: wrap; min-width: 200px; }
.ex-controls-group { display: flex; flex-direction: column; gap: 4px; }
.ex-controls-group label { font-size: 10px; color: var(--gray); }
.ex-declined { opacity: .45; filter: grayscale(.7); }
.ex-declined .ex-name { text-decoration: line-through; color: var(--gray); }

/* ============================================================
   SANSHO EDIT CARDS
============================================================ */
.se-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 14px; overflow: hidden; border-left: 5px solid var(--navy2); transition: border-color .2s, box-shadow .3s; }
.se-card.tokubetsu { border-left-color: var(--gold); }
.se-card.sansho    { border-left-color: var(--gray); }
.se-card.unsaved   { border-left-color: var(--orange); }
.se-card-head { padding: 10px 18px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.se-card-head.tokubetsu { background: linear-gradient(90deg, #7f5c0a, var(--gold)); }
.se-card-head.sansho    { background: linear-gradient(90deg, #374151, #6b7280); }
.se-company { font-weight: 700; font-size: 15px; color: var(--navy); }
.se-card-head.sansho .se-company { color: var(--white); }
.se-card-head.tokubetsu .se-company { color: var(--navy); }
.se-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.se-ku-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; background: rgba(255,255,255,.3); white-space: nowrap; }
.unsaved-label { font-size: 10px; background: var(--orange); color: white; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
.se-body { padding: 16px 18px; }
.se-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 14px; }
.se-field { display: flex; flex-direction: column; gap: 5px; }
.se-field label { font-size: 11px; font-weight: 700; color: var(--gray); letter-spacing: .05em; }
.se-field input,
.se-field select { border: 1px solid var(--gray3); border-radius: 7px; padding: 8px 11px; font-size: 13px; font-family: 'Noto Sans JP', sans-serif; outline: none; transition: border .15s; }
.se-field input:focus,
.se-field select:focus { border-color: var(--navy2); background: #f8f9ff; }
.se-field input.filled { border-color: #86efac; background: #f0fdf4; }
.se-participants { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.se-p-block { background: var(--gray2); border-radius: 8px; padding: 12px 14px; }
.se-p-block h4 { font-size: 12px; font-weight: 700; color: var(--navy); margin-bottom: 10px; }
.se-actions { display: flex; justify-content: flex-end; gap: 8px; }

/* ============================================================
   PRINT
============================================================ */
@media print {
  /* 非表示にするUI要素 */
  .header .tabs, .filter-bar, .btn, .modal-overlay, .no-print { display: none !important; }

  /* ページ設定：A4縦・余白最小 */
  @page {
    size: A4 portrait;
    margin: 6mm 8mm;
  }

  /* ベース */
  * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  html, body { background: white; font-size: 10px; width: 100%; }
  .main { padding: 0; max-width: 100%; }

  /* 全タブ非表示→アクティブのみ表示 */
  .section { display: none !important; }
  .section.active { display: block !important; }

  /* ヘッダー簡略化 */
  .header { position: static; padding: 6px 8px 0; box-shadow: none; }
  .header-title { font-size: 13px; }
  .header-date  { font-size: 10px; }

  /* サマリーカード：横並び・コンパクト */
  .summary-row { gap: 6px; margin-bottom: 10px; }
  .card { padding: 8px 10px; box-shadow: none; border: 1px solid #ddd; }
  .card-value { font-size: 20px; }

  /* テーブル全体 */
  .table-wrap { box-shadow: none; border: 1px solid #ccc; }
  .tbl { font-size: 9px; }
  .tbl th { background: #0f2344 !important; color: white !important; padding: 5px 7px; font-size: 9px; }
  .tbl td { padding: 5px 7px; }

  /* 行の途中での改ページを禁止 */
  .tbl tr           { break-inside: avoid; page-break-inside: avoid; }
  .tbl thead        { display: table-header-group; } /* 各ページにヘッダー繰り返し */
  .phase-header td  { break-before: avoid; page-break-before: avoid; }
  .ex-card          { break-inside: avoid; page-break-inside: avoid; margin-bottom: 6px; }
  .se-card          { break-inside: avoid; page-break-inside: avoid; margin-bottom: 8px; }
  .card             { break-inside: avoid; page-break-inside: avoid; }

  /* サマリー行は改ページしない */
  .summary-row { break-inside: avoid; page-break-inside: avoid; }

  /* インラインセレクト→テキスト表示（印刷時はセレクトボックスを隠す） */
  .sel-inline { border: none; background: transparent; font-size: 9px; appearance: none; -webkit-appearance: none; pointer-events: none; }
  .inp-inline { border: none; background: transparent; font-size: 9px; }

  /* 出展企業カード */
  .ex-card-inner { padding: 8px 10px; gap: 8px; }
  .ex-name    { font-size: 11px; }
  .ex-product { font-size: 9px; }
  .ex-keyword { font-size: 8px; padding: 2px 5px; }
  .ex-declined { display: none; } /* 辞退企業は印刷省略 */
  #e-declined-wrap { display: none !important; }

  /* 賛助会員編集カード */
  .se-card-head { padding: 6px 10px; }
  .se-body      { padding: 8px 10px; }
  .se-row       { gap: 6px; }
  .se-participants { gap: 6px; }
  .se-p-block   { padding: 6px 8px; }
  .se-actions   { display: none; } /* 保存ボタン類は印刷省略 */

  /* フィルターバーの余韻を消す */
  .filter-bar { display: none !important; }
}
</style>
</head>
<body>

<!-- ============================================================
     HEADER
============================================================ -->
<div class="header">
  <div class="header-top">
    <div class="header-title">LBS クラブせとうち <span>第2回特別イベント 管理アプリ</span></div>
    <div class="header-date">📅 2025年5月18日（月）16:00〜</div>
  </div>
  <div class="tabs">
    <button class="tab active"  onclick="showTab('participants', this)">👥 参加者管理</button>
    <button class="tab"         onclick="showTab('sansho',       this)">✏️ 賛助会員編集</button>
    <button class="tab"         onclick="showTab('tasks',        this)">✅ タスク管理</button>
    <button class="tab"         onclick="showTab('exhibitors',   this)">🏢 出展企業</button>
  </div>
</div>

<div class="main">

<!-- ============================================================
     TAB: 参加者管理
============================================================ -->
<div id="sec-participants" class="section active">
  <div class="summary-row" id="p-summary"></div>
  <div class="filter-bar">
    <input type="text"  id="p-q"      placeholder="企業名・氏名で検索…" oninput="renderParticipants()">
    <select             id="p-ku"     onchange="renderParticipants()">
      <option value="">全区分</option>
      <option>賛助会員（特別）</option><option>賛助会員</option>
      <option>正会員</option><option>学生</option><option>一般</option>
    </select>
    <select             id="p-status" onchange="renderParticipants()">
      <option value="">参加確認：全て</option>
      <option>参加</option><option>欠席</option><option>未確認</option>
    </select>
    <button class="btn btn-gold"    onclick="openParticipantModal()">＋ 参加者追加</button>
    <button class="btn btn-outline no-print" onclick="window.print()">🖨️ 印刷</button>
  </div>
  <div class="table-wrap">
    <table class="tbl">
      <thead><tr>
        <th>区分</th><th>企業・団体名</th><th>氏名①</th><th>氏名②</th>
        <th>メールアドレス</th><th>案内送信</th><th>参加確認</th>
        <th>担当窓口</th><th>備考</th><th class="no-print">操作</th>
      </tr></thead>
      <tbody id="p-body"></tbody>
    </table>
  </div>
</div>

<!-- ============================================================
     TAB: 賛助会員編集
============================================================ -->
<div id="sec-sansho" class="section">
  <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:18px; flex-wrap:wrap; gap:10px">
    <div>
      <p style="font-size:16px; font-weight:700; color:var(--navy); margin-bottom:4px">賛助会員 データ編集</p>
      <p style="font-size:12px; color:var(--gray)">担当者・氏名・メールなどを各社カードで直接入力します。各社最大2名まで参加可。</p>
    </div>
    <div style="display:flex; gap:8px; align-items:center">
      <select id="se-filter" onchange="renderSanshoEdit()" style="border:1px solid var(--gray3); border-radius:7px; padding:7px 12px; font-size:13px;">
        <option value="">全区分表示</option>
        <option value="賛助会員（特別）">特別賛助パートナーのみ</option>
        <option value="賛助会員">賛助パートナーのみ</option>
      </select>
      <button class="btn btn-outline no-print" onclick="window.print()">🖨️ 印刷</button>
    </div>
  </div>
  <div id="se-body"></div>
</div>

<!-- ============================================================
     TAB: タスク管理
============================================================ -->
<div id="sec-tasks" class="section">
  <div class="summary-row" id="t-summary"></div>
  <div class="filter-bar">
    <input type="text" id="t-q"      placeholder="タスク名・担当で検索…" oninput="renderTasks()">
    <select            id="t-phase"  onchange="renderTasks()">
      <option value="">全フェーズ</option>
      <option>フェーズ①</option><option>フェーズ②</option><option>フェーズ③</option>
      <option>フェーズ④</option><option>フェーズ⑤</option>
    </select>
    <select            id="t-status" onchange="renderTasks()">
      <option value="">ステータス：全て</option>
      <option>未着手</option><option>確認中</option><option>完了</option>
    </select>
    <button class="btn btn-gold"    onclick="openTaskModal()">＋ タスク追加</button>
    <button class="btn btn-outline no-print" onclick="window.print()">🖨️ 印刷</button>
  </div>
  <div class="table-wrap">
    <table class="tbl">
      <thead><tr>
        <th>フェーズ</th><th>期限</th><th>タスク</th><th>詳細・内容</th>
        <th>担当</th><th>確認先</th><th>ステータス</th><th>メモ</th>
        <th class="no-print">操作</th>
      </tr></thead>
      <tbody id="t-body"></tbody>
    </table>
  </div>
</div>

<!-- ============================================================
     TAB: 出展企業
============================================================ -->
<div id="sec-exhibitors" class="section">
  <div class="summary-row" id="e-summary"></div>
  <div class="filter-bar">
    <input type="text" id="e-q"      placeholder="企業名・提供物で検索…" oninput="renderExhibitors()">

function renderParticipantSummary() {
  const total     = participants.reduce((s,p) => s + (p.name2 ? 2 : p.name1 ? 1 : 1), 0);
  const confirmed = participants.filter(p => p.status === '参加').length;
  const sent      = participants.filter(p => p.mail !== '未送信').length;
  const unsent    = participants.filter(p => p.mail === '未送信').length;
  const pct = Math.min(Math.round(confirmed/50*100), 100);
  $('p-summary').innerHTML = `
    <div class="card gold">
      <div class="card-label">招待者数（延べ）</div>
      <div class="card-value">${total}</div>
      <div class="card-sub">上限50名</div>
      <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
    </div>
    <div class="card green">
      <div class="card-label">参加確定</div>
      <div class="card-value" style="color:var(--green)">${confirmed}</div>
      <div class="card-sub">名</div>
    </div>
    <div class="card">
      <div class="card-label">案内送信済</div>
      <div class="card-value">${sent}</div>
      <div class="card-sub">社・名</div>
    </div>
    <div class="card orange">
      <div class="card-label">案内未送信</div>
      <div class="card-value" style="color:var(--orange)">${unsent}</div>
      <div class="card-sub">要対応</div>
    </div>`;
}

function renderParticipants() {
  renderParticipantSummary();
  const q  = $('p-q').value.toLowerCase();
  const ku = $('p-ku').value;
  const st = $('p-status').value;
  const list = participants.filter(p =>
    (!ku || p.ku === ku) &&
    (!st || p.status === st) &&
    (!q  || `${p.company}${p.name1}${p.name2}${p.contact}`.toLowerCase().includes(q))
  );
  if (!list.length) {
    $('p-body').innerHTML = '<tr><td colspan="10" style="text-align:center;color:var(--gray);padding:24px">該当するデータがありません</td></tr>';
    return;
  }
  $('p-body').innerHTML = list.map(p => {
    const rowCls = p.ku==='賛助会員（特別）'?'row-tokubetsu':p.ku==='賛助会員'?'row-sansho':'';
    const warn   = p.mail==='未送信' ? '<span class="warn-icon">⚠️</span> ' : '';
    const mailSel = `<select class="sel-inline s-${esc(p.mail)}" onchange="quickUpdate('p',${p.id},'mail',this.value)">${MAIL_LIST.map(s=>`<option${s===p.mail?' selected':''}>${s}</option>`).join('')}</select>`;
    const statSel = `<select class="sel-inline s-${esc(p.status)}" onchange="quickUpdate('p',${p.id},'status',this.value)">${PART_LIST.map(s=>`<option${s===p.status?' selected':''}>${s}</option>`).join('')}</select>`;
    return `<tr class="${rowCls}">
      <td>${kuBadge(p.ku)}</td>
      <td><strong>${esc(p.company)||'—'}</strong></td>
      <td>${p.name1 ? esc(p.name1) : '<span style="color:var(--gray)">未記入</span>'}</td>
      <td>${esc(p.name2)||'—'}</td>
      <td style="font-size:12px;color:var(--gray)">${esc(p.email)||'—'}</td>
      <td>${warn}${mailSel}</td>
      <td>${statSel}</td>
      <td>${esc(p.contact)||'—'}</td>
      <td style="font-size:12px;color:var(--gray);max-width:160px">${esc(p.note)}</td>
      <td class="no-print" style="white-space:nowrap">
        <button class="btn btn-sm btn-outline" onclick="openParticipantModal(${p.id})">編集</button>

  }).join('');

function openParticipantModal(id = null) {
  editingPId = id;

  $('fp-company').value = p.company || '';
  $('fp-name1').value   = p.name1   || '';
  $('fp-name2').value   = p.name2   || '';
  $('fp-email').value   = p.email   || '';

  $('fp-status').value  = p.status  || '未確認';

function saveParticipant() {
  const company = $('fp-company').value.trim();
  const name1   = $('fp-name1').value.trim();
  if (!company && !name1) { alert('企業名または氏名を入力してください'); return; }
  const vals = {
    ku: $('fp-ku').value, company, name1, name2: $('fp-name2').value.trim(),
    email: $('fp-email').value.trim(), mail: $('fp-mail').value,
    status: $('fp-status').value, contact: $('fp-contact').value.trim(), note: $('fp-note').value.trim()
  };
  if (editingPId) {
    Object.assign(participants.find(x => x.id === editingPId), vals);
  } else {
    participants.push({ id: nextPId++, ...vals });
  }
  closeModal('modal-p');
  renderParticipants();
}

        </div>
        <div class="se-body">
          <div class="se-row">
            <div class="se-field">
              <label>案内メール送信</label>
              <select id="se-mail-${p.id}" onchange="seMarkUnsaved(${p.id})">${MAIL_LIST.map(s=>`<option${s===p.mail?' selected':''}>${s}</option>`).join('')}</select>

            <div class="se-field">
              <label>参加確認ステータス</label>

              <label>メールアドレス</label>
              <input type="email" id="se-email-${p.id}" value="${esc(p.email)}" placeholder="example@co.jp" oninput="seMarkUnsaved(${p.id})">
            </div>
          </div>
          <div class="se-participants">
            <div class="se-p-block">
              <h4>👤 参加者 1名目　${p.name1 ? '<span style="color:var(--green);font-size:10px">✓ 入力済</span>' : '<span style="color:var(--orange);font-size:10px">未記入</span>'}</h4>
              <div class="se-field">
                <label>氏名</label>
                <input id="se-name1-${p.id}" value="${esc(p.name1)}" placeholder="山田 太郎" class="${p.name1?'filled':''}" oninput="seMarkUnsaved(${p.id});this.className=this.value?'filled':''">
              </div>
            </div>
            <div class="se-p-block">
              <h4>👤 参加者 2名目　${p.name2 ? '<span style="color:var(--green);font-size:10px">✓ 入力済</span>' : '<span style="color:var(--gray);font-size:10px">任意</span>'}</h4>

                <input id="se-name2-${p.id}" value="${esc(p.name2)}" placeholder="田中 花子（2名の場合）" class="${p.name2?'filled':''}" oninput="seMarkUnsaved(${p.id});this.className=this.value?'filled':''">

function seMarkUnsaved(id) {
  unsavedSE.add(id);
  const card = $('se-card-'+id);
  if (card) card.classList.add('unsaved');
}

function seSave(id) {
  const p = participants.find(x => x.id === id);
  if (!p) return;
  p.mail    = $(`se-mail-${id}`).value;
  p.status  = $(`se-status-${id}`).value;
  p.contact = $(`se-contact-${id}`).value.trim();
  p.email   = $(`se-email-${id}`).value.trim();
  p.name1   = $(`se-name1-${id}`).value.trim();
  p.name2   = $(`se-name2-${id}`).value.trim();
  p.note    = $(`se-note-${id}`).value.trim();
  unsavedSE.delete(id);
  const card = $('se-card-'+id);
  if (card) {
    card.classList.remove('unsaved');
    card.style.boxShadow = '0 0 0 3px var(--green)';
    setTimeout(() => { card.style.boxShadow = ''; }, 900);
  }
  renderParticipantSummary();
}

function seReset(id) {
  if (!confirm('この社の変更を元に戻しますか？')) return;
  unsavedSE.delete(id);
  renderSanshoEdit();
}

function renderTaskSummary() {
  const total = tasks.length;
  const done  = tasks.filter(t => t.status === '完了').length;
  const mid   = tasks.filter(t => t.status === '確認中').length;
  const warn  = tasks.filter(t => t.memo.includes('【要確認】') && t.status !== '完了').length;

    </div>
    <div class="card green">
      <div class="card-label">完了</div>
      <div class="card-value" style="color:var(--green)">${done}</div>
      <div class="card-sub">${pct}%</div>
      <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
    </div>
    <div class="card orange">
      <div class="card-label">確認中</div><div class="card-value" style="color:var(--orange)">${mid}</div><div class="card-sub">件</div>
    </div>
    <div class="card red">
      <div class="card-label">⚠️ 要確認</div><div class="card-value" style="color:var(--red)">${warn}</div><div class="card-sub">件</div>
    </div>`;
}

// ============================================================
// TASKS — テーブル
// ============================================================
function renderTasks() {
  renderTaskSummary();
  const q  = $('t-q').value.toLowerCase();
  const ph = $('t-phase').value;
  const st = $('t-status').value;
  const list = tasks.filter(t =>
    (!ph || t.phase === ph) &&
    (!st || t.status === st) &&
    (!q  || `${t.task}${t.owner}${t.detail}`.toLowerCase().includes(q))
  );
  let html = '', lastPhase = null;
  list.forEach(t => {
    if (t.phase !== lastPhase) {
      const s = PHASE_STYLE[t.phase] || {bg:'#eee',fg:'#333'};
      html += `<tr class="phase-header"><td colspan="9" style="background:${s.bg};color:${s.fg}">${t.phase}</td></tr>`;
      lastPhase = t.phase;
    }
    const isWarn = t.memo.includes('【要確認】') && t.status !== '完了';
    const stSel = `<select class="sel-inline t-${esc(t.status)}" onchange="quickUpdate('t',${t.id},'status',this.value)">${TASK_LIST.map(s=>`<option${s===t.status?' selected':''}>${s}</option>`).join('')}</select>`;
    html += `<tr class="${isWarn?'row-warn':''}">
      <td style="font-size:11px;color:var(--gray)">${t.phase}</td>
      <td style="white-space:nowrap;font-size:12px;font-weight:700">${esc(t.deadline)}</td>
      <td><strong>${esc(t.task)}</strong>${isWarn?' <span class="warn-icon">⚠️</span>':''}</td>
      <td style="font-size:12px;color:var(--gray);max-width:220px">${esc(t.detail)}</td>
      <td style="white-space:nowrap">${esc(t.owner)}</td>
      <td style="font-size:12px;color:var(--gray);white-space:nowrap">${esc(t.target)}</td>
      <td>${stSel}</td>
      <td style="font-size:11px;color:${isWarn?'var(--orange)':'var(--gray)'};max-width:180px">${esc(t.memo)}</td>
      <td class="no-print" style="white-space:nowrap">
        <button class="btn btn-sm btn-outline" onclick="openTaskModal(${t.id})">編集</button>
        <button class="btn btn-sm btn-danger"  onclick="deleteItem('t',${t.id})" style="margin-left:4px">削除</button>
      </td>
    </tr>`;
  });
  $('t-body').innerHTML = html || '<tr><td colspan="9" style="text-align:center;color:var(--gray);padding:24px">該当するタスクがありません</td></tr>';
}

// ============================================================
// TASKS — モーダル
// ============================================================
function openTaskModal(id = null) {
  editingTId = id;
  $('modal-t-title').textContent = id ? 'タスクを編集' : 'タスクを追加';
  const t = id ? tasks.find(x => x.id === id) : {};
  $('ft-phase').value    = t.phase    || 'フェーズ①';
  $('ft-deadline').value = t.deadline || '';
  $('ft-task').value     = t.task     || '';
  $('ft-detail').value   = t.detail   || '';
  $('ft-owner').value    = t.owner    || '事務局';
  $('ft-target').value   = t.target   || '';
  $('ft-status').value   = t.status   || '未着手';
  $('ft-done').value     = t.done     || '';
  $('ft-memo').value     = t.memo     || '';
  openModal('modal-t');
}

function saveTask() {
  const name = $('ft-task').value.trim();
  if (!name) { alert('タスク名を入力してください'); return; }
  const vals = {
    phase: $('ft-phase').value, deadline: $('ft-deadline').value.trim(), task: name,
    detail: $('ft-detail').value.trim(), owner: $('ft-owner').value.trim(),
    target: $('ft-target').value.trim(), status: $('ft-status').value,
    done: $('ft-done').value.trim(), memo: $('ft-memo').value.trim()
  };
  if (editingTId) {
    Object.assign(tasks.find(x => x.id === editingTId), vals);
  } else {
    tasks.push({ id: nextTId++, ...vals });
  }
  closeModal('modal-t');
  renderTasks();
}

  const confirmed = active.filter(e => e.status === '確定' && e.cat !== '調理担当').length;
  const chefs     = exhibitors.filter(e => e.cat === '調理担当' && e.status === '確定').length;
  const nego      = active.filter(e => e.status === '交渉中').length;
  const unconf    = active.filter(e => e.status === '未確認').length;
  const declined  = exhibitors.filter(e => e.status === '辞退').length;
  $('e-summary').innerHTML = `
    <div class="card green">
      <div class="card-label">出展確定</div><div class="card-value" style="color:var(--green)">${confirmed}</div><div class="card-sub">社</div>
    </div>
    <div class="card gold">
      <div class="card-label">調理担当確定</div><div class="card-value" style="color:var(--orange)">${chefs}</div><div class="card-sub">名</div>
    </div>
    <div class="card orange">
      <div class="card-label">交渉中</div><div class="card-value" style="color:var(--orange)">${nego}</div><div class="card-sub">社　要フォロー</div>
    </div>
    <div class="card">
      <div class="card-label">未確認</div><div class="card-value">${unconf}</div>
      <div class="card-sub">${declined ? `<span style="color:var(--red)">辞退 ${declined}社</span>` : '辞退なし'}</div>
    </div>`;
}

// ============================================================
// EXHIBITORS — カード
// ============================================================
function buildExhibitorCard(e, dimmed) {
  const catKey = CAT_KEY[e.cat] || 'other';
  const stSel = `<select class="sel-inline" style="color:${{確定:'var(--green)',交渉中:'var(--orange)',未確認:'var(--gray)',辞退:'var(--red)'}[e.status]};font-weight:700"
    onchange="quickUpdate('e',${e.id},'status',this.value);renderExhibitors()">${EX_LIST.map(s=>`<option${s===e.status?' selected':''}>${s}</option>`).join('')}</select>`;
  return `
  <div class="ex-card cat-${catKey}${dimmed?' ex-declined':''}">
    <div class="ex-card-inner">
      <div class="ex-no">${e.no||'★'}</div>
      <div class="ex-body">
        <div class="ex-cat">${esc(e.cat)}</div>
        <div class="ex-name">${esc(e.name)}</div>
        <div class="ex-product">提供：${esc(e.product||'—')}</div>
        ${e.keyword ? `<div class="ex-keyword">${esc(e.keyword)}</div>` : ''}
        ${e.note    ? `<div style="font-size:11px;color:${dimmed?'var(--gray)':'var(--orange)'};margin-top:6px">${dimmed?'':'⚠️ '}${esc(e.note)}</div>` : ''}
      </div>
      <div class="ex-controls">
        <div class="ex-controls-group"><label>ステータス</label>${stSel}</div>
        <div class="ex-controls-group">
          <label>担当窓口</label>
          <input class="inp-inline" value="${esc(e.contact)}" placeholder="担当者名" style="width:110px" onchange="quickUpdate('e',${e.id},'contact',this.value)">
        </div>
        <div class="ex-controls-group no-print" style="flex-direction:row;gap:4px;align-self:center;margin-top:12px">
          <button class="btn btn-sm btn-outline" onclick="openExhibitorModal(${e.id})">編集</button>
          <button class="btn btn-sm btn-danger"  onclick="deleteItem('e',${e.id})">削除</button>
        </div>
      </div>
    </div>
  </div>`;
}

// ============================================================
// EXHIBITORS — 一覧
// ============================================================
function renderExhibitors() {
  renderExhibitorSummary();
  const q  = $('e-q').value.toLowerCase();
  const st = $('e-status').value;
  const active = exhibitors.filter(e =>
    e.status !== '辞退' &&
    (!st || e.status === st) &&
    (!q  || `${e.name}${e.product||''}${e.keyword||''}`.toLowerCase().includes(q))
  );
  $('e-body').innerHTML = active.length
    ? active.map(e => buildExhibitorCard(e, false)).join('')
    : '<div style="text-align:center;color:var(--gray);padding:32px">該当する企業がありません</div>';

  const declined = exhibitors.filter(e => e.status === '辞退');
  const wrap = $('e-declined-wrap');
  if (declined.length) {
    wrap.style.display = 'block';
    $('e-declined-label').textContent = (declinedOpen?'▼ ':'▶ ') + `辞退・見送り企業（${declined.length}社）`;
    $('e-declined-body').innerHTML = declined.map(e => buildExhibitorCard(e, true)).join('');
    $('e-declined-body').style.display = declinedOpen ? 'block' : 'none';
  } else {
    wrap.style.display = 'none';
  }
}

function toggleDeclined() {
  declinedOpen = !declinedOpen;
  renderExhibitors();
}

// ============================================================
// EXHIBITORS — モーダル
// ============================================================
function openExhibitorModal(id = null) {
  editingEId = id;
  $('modal-e-title').textContent = id ? '出展企業を編集' : '出展企業を追加';
  const e = id ? exhibitors.find(x => x.id === id) : {};
  $('fe-cat').value     = e.cat     || 'その他';
  $('fe-status').value  = e.status  || '未確認';
  $('fe-name').value    = e.name    || '';
  $('fe-product').value = e.product || '';
  $('fe-keyword').value = e.keyword || '';
  $('fe-contact').value = e.contact || '';
  $('fe-note').value    = e.note    || '';
  openModal('modal-e');
}

function saveExhibitor() {
  const name = $('fe-name').value.trim();
  if (!name) { alert('企業名を入力してください'); return; }
  const vals = {
    cat: $('fe-cat').value, status: $('fe-status').value, name,
    product: $('fe-product').value.trim(), keyword: $('fe-keyword').value.trim(),
    contact: $('fe-contact').value.trim(), note: $('fe-note').value.trim()
  };
  if (editingEId) {
    Object.assign(exhibitors.find(x => x.id === editingEId), vals);
  } else {
    exhibitors.push({ id: nextEId++, no: '', ...vals });
  }
  closeModal('modal-e');
  renderExhibitors();
}

// ============================================================
// GENERIC HELPERS — クイック更新・削除
// ============================================================
function quickUpdate(type, id, field, val) {
  const store = {p:participants, t:tasks, e:exhibitors}[type];
  const item = store.find(x => x.id === id);
  if (item) { item[field] = val; }
  if (type === 'p') renderParticipantSummary();
  if (type === 't') renderTaskSummary();
  if (type === 'e') renderExhibitorSummary();
}

function deleteItem(type, id) {
  const store = {p:participants, t:tasks, e:exhibitors}[type];
  const item = store.find(x => x.id === id);
  if (!item) return;
  const label = item.company || item.task || item.name || '';
  const hint = type === 'e' ? '\n（削除せず「辞退」ステータスにすることもできます）' : '';
  if (!confirm(`「${label}」を削除しますか？${hint}`)) return;
  const map = {p:'participants', t:'tasks', e:'exhibitors'};
  window[map[type]] = store.filter(x => x.id !== id);
  const render = {p:renderParticipants, t:renderTasks, e:renderExhibitors};
  render[type]();
}

// ============================================================
// INIT
// ============================================================
renderParticipants();
</script>
</body>
</html>
